name: Sultan
permissions:
  contents: write
  actions: write
on:
  workflow_call:
    inputs:
      codename:
        required: true
        type: string
      repo:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      build_with_susfs:
        required: false
        type: boolean
        default: false
jobs:
  build-kernel:
    name: build-kernel-sultan-kernelsu-next${{ matrix.susfs == true && '-susfs' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        susfs: ${{ inputs.build_with_susfs && fromJSON('[true, false]') || fromJSON('[false]') }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld
          
      - name: Set CONFIG Environment Variable
        run: |
          if [[ "${{ inputs.codename }}" == "tensynos" || "${{ inputs.repo }}" == "android_kernel_google_tensynos" ]]; then
            CONFIG="android_kernel_google_tensynos"
          else
            CONFIG="${{ inputs.repo }}"
          fi
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          echo "CONFIG set to: $CONFIG"
          
      - name: Clone AnyKernel3 and Other Dependencies
        run: |
          echo "Cloning AnyKernel3 and other dependencies..."
          ANYKERNEL_BRANCH="sultan-${{ inputs.codename }}"
          echo "Using branch for AnyKernel3: $ANYKERNEL_BRANCH"
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/kerneltoast/$CONFIG
          if [[ "${{ matrix.susfs }}" == "true" ]]; then
            SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
            echo "Using branch for SUSFS: $SUSFS_BRANCH"
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          fi
          
      - name: Add KernelSU-Next
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"
          echo "Adding latest KernelSU-Next from dev branch..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s dev || {
            echo "ERROR: KernelSU-Next setup.sh failed!"
            ls -la
            exit 1
          }
          # Verify the directory was created (new setup.sh uses KernelSU-Next, old used KernelSU)
          for dir in KernelSU-Next KernelSU; do
            if [ -d "$dir" ]; then echo "Found KSU directory: $dir"; fi
          done
          if [ ! -d "KernelSU-Next" ] && [ ! -d "KernelSU" ]; then
            echo "ERROR: No KernelSU directory found after setup!"
            ls -la
            exit 1
          fi
          
      - name: Apply SUSFS Patches
        if: ${{ matrix.susfs }}
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"
          echo "Copying SUSFS patches..."
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./
          mkdir -p ./fs/
          mkdir -p ./include/linux/
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/ 2>/dev/null || true
          
          echo "Patching KernelSU-Next for SUSFS..."
          # Setup.sh may create KernelSU-Next or KernelSU directory
          KSU_DIR="KernelSU-Next"
          if [ ! -d "$KSU_DIR" ]; then KSU_DIR="KernelSU"; fi
          if [ ! -d "$KSU_DIR" ]; then
            echo "ERROR: No KernelSU directory found! Contents:"
            ls -la
            exit 1
          fi
          cd "$KSU_DIR"
          cp ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
          patch -p1 -F5 --ignore-whitespace < 10_enable_susfs_for_ksu.patch || echo "WARNING: SUSFS enable patch had some failures — fix patch will attempt to resolve"

          echo "Applying unified SUSFS fix patch for latest KSU-Next..."
          cp "$GITHUB_WORKSPACE/susfs-fix-latest.patch" ./
          patch -p1 -F3 --ignore-whitespace < susfs-fix-latest.patch || echo "WARNING: fix patch had some failures (non-fatal, continuing)"

          echo "KernelSU-Next patched"
          cd ..
          
          echo "Applying SUSFS GKI patch..."
          patch -p1 -F5 --ignore-whitespace < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || echo "WARNING: SUSFS GKI patch had failures"
          
          echo "Applying Sultan-specific patches..."
          if [ -f "../kernel_patches/sultan/fix_base.c.patch" ]; then
            echo "Applying fix_base.c.patch..."
            patch -p1 -F5 --ignore-whitespace < ../kernel_patches/sultan/fix_base.c.patch || echo "WARNING: fix_base.c.patch had failures"
          fi
          if [ -f "../kernel_patches/sultan/sys.c_fix.patch" ]; then
            echo "Applying sys.c_fix.patch..."
            patch -p1 -F5 --ignore-whitespace < ../kernel_patches/sultan/sys.c_fix.patch || echo "WARNING: sys.c_fix.patch had failures"
          fi

          # Strip Clang-only flags that break GCC (after ALL patches applied)
          echo "Stripping GCC-incompatible flags from all Kbuild and Makefile files..."
          find . -name "Kbuild" -type f -print -exec sed -i 's/-Wno-gcc-compat//g' {} \;
          find . -name "Makefile" -type f -print -exec sed -i 's/-Wno-gcc-compat//g' {} \;
          
          # Verify the strip worked
          echo "Verifying no -Wno-gcc-compat remains..."
          if grep -rq "Wno-gcc-compat" . --include="Kbuild" --include="Makefile" 2>/dev/null; then
            echo "WARNING: -Wno-gcc-compat still found in:"
            grep -rn "Wno-gcc-compat" . --include="Kbuild" --include="Makefile" 2>/dev/null
            echo "Attempting force removal..."
            grep -rl "Wno-gcc-compat" . --include="Kbuild" --include="Makefile" 2>/dev/null | xargs -r sed -i 's/-Wno-gcc-compat//g'
          else
            echo "Clean: no -Wno-gcc-compat found in Kbuild/Makefile"
          fi

          # Post-patch fixup: remove calls to stripped hook functions in init.c
          # The patch may have partially failed, leaving dangling references
          # NOTE: we do NOT remove ksu_late_loaded lines — that would break
          # if/else control flow. An unused variable warning is suppressed by -w.
          echo "Post-patch fixup for init.c..."
          for init_c in $(find . -path "*/kernelsu/core/init.c" -o -path "*/KernelSU*/kernel/core/init.c" 2>/dev/null); do
            echo "  Fixing $init_c"
            # Remove includes for headers whose .o files were stripped from Kbuild
            sed -i '/#include.*hook\/syscall_hook_manager\.h/d' "$init_c"
            sed -i '/#include.*hook\/lsm_hook\.h/d' "$init_c"
            sed -i '/#include.*hook\/syscall_hook\.h/d' "$init_c"
            sed -i '/#include.*infra\/symbol_resolver\.h/d' "$init_c"
            # Remove calls to functions whose .o files were stripped from Kbuild
            sed -i '/ksu_init_symbol_resolver()/d' "$init_c"
            sed -i '/ksu_syscall_hook_init()/d' "$init_c"
            sed -i '/ksu_lsm_hook_init()/d' "$init_c"
            sed -i '/ksu_lsm_hook_exit()/d' "$init_c"
            sed -i '/ksu_syscall_hook_manager_init()/d' "$init_c"
            sed -i '/ksu_syscall_hook_manager_exit()/d' "$init_c"
            # Remove x86_64 check blocks (can cause build issues on ARM64)
            sed -i '/#if defined(__x86_64__)/,/X86_FEATURE_INDIRECT_SAFE.*$/d' "$init_c"
            sed -i '/#ifndef X86_FEATURE_INDIRECT_SAFE/,/^#endif/d' "$init_c"
            # Ensure susfs.h include exists if susfs_init() or CONFIG_KSU_SUSFS is used
            if grep -q "susfs_init\|CONFIG_KSU_SUSFS" "$init_c" 2>/dev/null; then
              if ! grep -q '#include.*linux/susfs' "$init_c" 2>/dev/null; then
                sed -i '1s/^/#include <linux\/susfs.h>\n/' "$init_c"
                echo "    Added missing susfs.h include"
              fi
            fi
            # If ksu_late_loaded is used but not declared (partial patch removed declaration),
            # add the declaration back to avoid "undeclared" error
            if grep -q "ksu_late_loaded" "$init_c" 2>/dev/null && ! grep -q "bool ksu_late_loaded\|extern bool ksu_late_loaded" "$init_c" 2>/dev/null; then
              sed -i '/struct cred \*ksu_cred;/a\bool ksu_late_loaded;' "$init_c"
              echo "    Restored missing ksu_late_loaded declaration"
            fi
            echo "  Fixed $init_c"
          done

      - name: Configure KernelSU
        run: |
          cd "$CONFIG"
          echo "# KernelSU Configuration" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          if [[ "${{ matrix.susfs }}" == "true" ]]; then
            echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          else
            echo "CONFIG_KSU_SUSFS=n" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          fi

      - name: Configure Mountify Support
        run: |
          cd "$CONFIG"
          echo "# Mountify Support" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Configure Networking
        run: |
          cd "$CONFIG"
          echo "# Networking Configuration" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP6_NF_MATCH_HL=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Configure TCP Congestion Control
        run: |
          cd "$CONFIG"
          echo "# BBR TCP Congestion Control" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TCP_CONG_BIC=n" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_TCP_CONG_HTCP=n" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Configure IPSet Support
        run: |
          cd "$CONFIG"
          echo "# IPSet Support" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_MAX=65534" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_HASH_IP=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> ./arch/arm64/configs/${{ inputs.codename }}_defconfig

      - name: Fix Mali GPU Compatibility (Kernel 6.1)
        run: |
          cd "$CONFIG"
          # Mali GPU driver's version_compat_defs.h redefines vm_flags_set/vm_flags_clear/__vm_flags_mod
          # which are already present in Linux 6.1+. Guard them with a kernel version check.
          # The file may be at different paths depending on kernel source layout.
          MALI_FILES=$(find google-modules -name "version_compat_defs.h" -type f 2>/dev/null)
          if [ -z "$MALI_FILES" ]; then
            echo "Mali GPU compat header not found — skipping"
          else
            for f in $MALI_FILES; do
              echo "Patching $f for Linux 6.1+..."
              sed -i '/#ifndef[[:space:]]VM_FLAGS_ACCESSORS/{
                s/#ifndef[[:space:]]VM_FLAGS_ACCESSORS/#if !defined(VM_FLAGS_ACCESSORS) \&\& LINUX_VERSION_CODE < KERNEL_VERSION(6, 1, 0)/
              }' "$f"
              echo "Patched $f successfully"
            done
          fi

      - name: Build Kernel
        run: |
          cd "$CONFIG"
          make ARCH=arm64 ${{ inputs.codename }}_defconfig
          if [[ "${{ matrix.susfs }}" == "true" ]]; then
            # Find clang (Ubuntu may install as clang-18, clang-14, etc.)
            CLANG_BIN=$(which clang 2>/dev/null || ls /usr/bin/clang-[0-9]* 2>/dev/null | head -1)
            LLD_BIN=$(which ld.lld 2>/dev/null || ls /usr/bin/ld.lld-[0-9]* 2>/dev/null | head -1)
            echo "CLANG_BIN=$CLANG_BIN"
            echo "LLD_BIN=$LLD_BIN"
            if [ -n "$CLANG_BIN" ] && [ -n "$LLD_BIN" ]; then
              echo "Building with Clang/LLVM for SUSFS compatibility..."
              make -j$(nproc) ARCH=arm64 \
                CC="$CLANG_BIN" \
                LD="$LLD_BIN" \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                KCFLAGS="-w"
            else
              echo "WARNING: clang/ld.lld not found, falling back to GCC"
              echo "Patching Kbuild one more time to be safe..."
              find . -name "Kbuild" -type f -exec sed -i 's/-Wno-gcc-compat//g' {} \;
              grep -rn "Wno-gcc-compat" . --include="Kbuild" --include="Makefile" 2>/dev/null || echo "Clean"
              make -j$(nproc) ARCH=arm64 \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                KCFLAGS="-w"
            fi
          else
            make -j$(nproc) ARCH=arm64 \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              KCFLAGS="-w"
          fi

      - name: Package Kernel
        run: |
          cd "$CONFIG"
          mkdir -p out
          cp arch/arm64/boot/Image out/
          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz out/
          fi
          if [ -f arch/arm64/boot/Image-dtb ]; then
            cp arch/arm64/boot/Image-dtb out/
          fi
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            cp arch/arm64/boot/Image.gz-dtb out/
          fi
          # Copy modules if they exist
          find . -name "*.ko" -exec cp {} out/ \;
          
      - name: Create AnyKernel3 Flashable Zip
        run: |
          cd AnyKernel3
          # Clean up previous artifacts
          rm -rf kernel/ dtbo.img
          mkdir -p kernel
          cp ../$CONFIG/out/Image* kernel/
          if [ -f ../$CONFIG/out/*.ko ]; then
            mkdir -p modules
            cp ../$CONFIG/out/*.ko modules/
          fi
          
          # Zip the contents
          zip -r9 ../${{ inputs.codename }}-Sultan-KernelSU-Next${{ matrix.susfs == true && '-SUSFS' || '' }}.zip * .version
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.codename }}-Sultan-KernelSU-Next${{ matrix.susfs == true && '-SUSFS' || '' }}
          path: |
            ${{ inputs.codename }}-Sultan-KernelSU-Next${{ matrix.susfs == true && '-SUSFS' || '' }}.zip
